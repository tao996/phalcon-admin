server {
    listen 80;

    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip 压缩
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml application/xml;
    gzip_vary on;

    root /var/www/public;
    index index.php index.html;

    error_log /var/log/nginx/error.log;

    location = /favicon.ico {
        access_log off; log_not_found off;
    }
    location = /robots.txt {
        access_log off; log_not_found off;
    }

    # project assets 静态资源
    location ~ ^/pstatic/(?<project>[^/]+)/(.*)$ {
        expires max;
        log_not_found off;
        access_log    off;
        root /var/www/App/Projects;
        try_files /$project/views/$2 $uri/ =404;
    }

    # module assets 模块静态资源
    location ~ ^/mstatic/(?<module>[^/]+)/(.*)$ {
        expires max;
        log_not_found off;
        access_log    off;
        root /var/www/App/Modules;
        try_files /$module/views/$2 $uri/ =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp|txt|doc|docx|xls|xlsx|ppt|pptx|pdf|sql|phtml)$ {
        expires max;
        log_not_found off;
        access_log    off;
        try_files $uri $uri/ =404;
    }

    location ^~ /(assets|upload|resources|files|bundles)/ {
        expires max;
        log_not_found off;
        access_log    off;
        try_files $uri $uri/ =404;
    }

    location ~ ^/(cache|content|css|images|js|pics)/.+\.php$ {
        return 404;
    }

    try_files $uri $uri/ @rewrite;

    location @rewrite {
        rewrite ^/(.*)$ /index.php?_url=/$1 last;
    }

    location ~ \.php$ {
        try_files $uri = 404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;

        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param HTTP_REFERER    $http_referer;
        fastcgi_param REQUEST_URI     $request_uri;

        include fastcgi_params;
    }

}
