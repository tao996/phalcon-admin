; =============================================================
; PHP 生产环境配置 — 由 deploy 工具生成
; 模板: deploys/template/php/php.ini
; 源: docker/php/php.prod.ini
; =============================================================

[PHP]

; --------------- Timezone ---------------
date.timezone = {{TZ}}

; --------------- Error Reporting ---------------
; 生产环境：不显示错误，只记录日志
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT & ~E_NOTICE
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/php_errors.log

; --------------- Resource Limits ---------------
memory_limit = 256M
max_execution_time = 60
max_input_time = 120
max_input_nesting_level = 64

; --------------- File Uploads ---------------
upload_max_filesize = 32M
post_max_size = 36M
max_file_uploads = 20

; --------------- Security ---------------
; 隐藏 PHP 版本
expose_php = Off
; 禁止远程文件访问
allow_url_fopen = Off
allow_url_include = Off
; 防止 nginx 解析漏洞
cgi.fix_pathinfo = 0
; 关闭危险函数
disable_functions = system,passthru,exec,shell_exec,popen,proc_open,proc_close,proc_get_status,show_source

; --------------- Sessions ---------------
; Cookie 由服务端控制，关闭浏览器即失效
session.cookie_lifetime = 0
session.use_strict_mode = 1
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax
; GC 概率：每次请求有 1/1000 概率清理过期 session 文件（仅文件驱动生效，redis 驱动不受影响）
session.gc_probability = 1
session.gc_divisor = 1000

; --------------- OpCache ---------------
[opcache]
zend_extension = opcache.so
opcache.enable = 1
opcache.enable_cli = 0
opcache.jit = 1255
opcache.jit_buffer_size = 100M
opcache.max_accelerated_files = 10000
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.revalidate_freq = 60
; 生产环境使用 Timestamps 减少文件 stat 开销
opcache.validate_timestamps = 0

; --------------- Xdebug (Disabled in Production) ---------------
; 生产环境禁用 xdebug
; 若镜像默认加载了 xdebug，通过以下配置禁用
xdebug.mode = off
