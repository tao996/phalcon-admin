version: '3.5'

# 宿主机 Nginx 模式：docker-compose 暴露端口供宿主机 nginx 反向代理
networks:
  backend:
    driver: bridge
  phalcon-shared:
    external: true

services:
  nginx:
    image: nginx:stable-alpine
    container_name: ${APP_NAME}-nginx
    ports:
      - '${NGINX_PORT}:80'
    restart: on-failure
    volumes:
      - ./src:/var/www
      - ./docker/nginx/sites/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/log/nginx:/var/log/nginx/:rw
    networks:
      - backend
      - phalcon-shared
    depends_on:
      - php

  php:
    image: authus/phalcon:5.13.0
    container_name: ${APP_NAME}-php
    working_dir: /var/www
    restart: on-failure
    volumes:
      - ./src:/var/www:delegated
      - ./docker/log/php:/var/log/php/:rw
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    networks:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PHP_IDE_CONFIG: "serverName=${APP_NAME}"
    env_file:
      - .env
    entrypoint: >
      sh -c "chmod -R 777 /var/www/storage 2>/dev/null; exec php-fpm"

  mysql:
    image: mysql:8.1.0
    container_name: ${APP_NAME}-mysql
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - TZ=${TZ}
      - LANG=C.UTF-8
    volumes:
      - ${DATA_PATH_HOST}/mysql:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/mysql/sql:/docker-entrypoint-initdb.d
      - ./docker/log/mysql:/var/log/mysql/:rw
    restart: always
    networks:
      - backend

  redis:
    image: redis:7.2-alpine
    container_name: ${APP_NAME}-redis
    environment:
      - TZ=${TZ}
    volumes:
      - ${DATA_PATH_HOST}/redis:/data
    command: "redis-server --requirepass ${REDIS_PASSWORD} --appendonly no"
    restart: always
    networks:
      - backend
